name: Build Data Catalog

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Step 01 - Checkout current branch
        uses: actions/checkout@v4

      - name: Step 02 - Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Step 03 - Install dbt dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core dbt-snowflake dbt-postgres

      - name: Step 04 - Install dbt packages
        working-directory: ./dbt
        run: dbt deps

      - name: Step 05 - Verify dbt
        run: dbt --version

      - name: Step 06 - Generate dbt docs
        working-directory: ./dbt
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt
          DBT_TARGET: prod
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          DBT_SCHEMA_TRANSFORM: ${{ secrets.DBT_SCHEMA_TRANSFORM }}
        run: |
          dbt docs generate --target "$DBT_TARGET"
          mkdir -p "${{ github.workspace }}/docs"
          cp target/*.json target/*.html "${{ github.workspace }}/docs"

      - name: Step 07 - Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/docs

  deploy-to-github-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
