name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push-dagster-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_REGION: us-east-1
      ECR_REPOSITORY: delta
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Authentication
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTION_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC

      - name: STS GetCallerIdentity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          DOCKER_BUILDKIT=1 docker build --file ./Dockerfile -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" . --no-cache
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Deploy to EC2 and start service
        env:
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOSTNAME: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_SECRET_ID: ${{ secrets.DEPLOY_SECRET_ID }}
        run: |
          echo "$PRIVATE_KEY" > private_key
          chmod 600 private_key

          scp -o StrictHostKeyChecking=no -i private_key docker-compose.yaml "$SSH_USER@$HOSTNAME:/home/$SSH_USER/docker-compose.yaml"

          ssh -o StrictHostKeyChecking=no -i private_key "$SSH_USER@$HOSTNAME" "
            secret=\$(aws secretsmanager get-secret-value --secret-id '$DEPLOY_SECRET_ID' --query SecretString --output text) &&
            echo \"\$secret\" | jq -r 'to_entries|map(\"\(.key)=\(.value)\")|.[]' > /home/$SSH_USER/.env &&
            cd /home/$SSH_USER &&
            docker compose down &&
            docker system prune -a --force &&
            docker compose pull --policy=always &&
            docker compose up -d
          "

      - name: Workflow status
        run: echo "🍏 This job's status is ${{ job.status }}."
