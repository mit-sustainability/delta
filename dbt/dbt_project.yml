name: 'delta'
version: '1.0.0'
config-version: 2

profile: 'delta'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
    - "target"
    - "dbt_modules"
    - "logs"
packages:
  - package: dbt-labs/dbt_utils
    version: 1.2.0

models:
  delta:
    +snowflake_warehouse: "BA_WAREHOUSE"
    +persist_docs:
      relation: true
      columns: true
    materialized: table
    raw:
      +meta:
        dagster:
          group: raw
      +schema: "{{ env_var('DBT_SCHEMA_RAW', 'src_byod_mitos') }}"
      +tags:
        - raw
      materialized: table
    staging:
      +meta:
        dagster:
          group: staging
      +schema: "{{ env_var('DBT_SCHEMA_TRANSFORM', 'rpt_mitos') }}"
      +tags:
        - staging
      materialized: view
    final:
      +meta:
        dagster:
          group: final
      +schema: "{{ env_var('DBT_SCHEMA_TRANSFORM', 'rpt_mitos') }}"
      +materialized: view
      +tags:
        - final
seeds:
  delta:
    +schema: "{{ env_var('DBT_SCHEMA_RAW', 'src_byod_mitos') }}"
