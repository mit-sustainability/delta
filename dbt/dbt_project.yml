name: 'delta'
version: '1.0.0'
config-version: 2

profile: 'delta'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
    - "target"
    - "dbt_modules"
    - "logs"
packages:
  - package: dbt-labs/dbt_utils
    version: 1.2.0

models:
  delta:
    +snowflake_warehouse: "BA_WAREHOUSE"
    +persist_docs:
      relation: true
      columns: true
    +materialized: table

    mitos:
      +meta:
        dagster:
          group: mitos
      +tags:
        - domain:mitos
      staging:
        +schema: "{{ env_var('DBT_SCHEMA_MITOS_TRANSFORM', env_var('DBT_SCHEMA_TRANSFORM', 'rpt_mitos')) }}"
        +tags:
          - staging
        +materialized: view
      final:
        +schema: "{{ env_var('DBT_SCHEMA_MITOS_TRANSFORM', env_var('DBT_SCHEMA_TRANSFORM', 'rpt_mitos')) }}"
        +tags:
          - final
        +materialized: view

    css:
      +meta:
        dagster:
          group: css
      +tags:
        - domain:css
      staging:
        +schema: "{{ env_var('DBT_SCHEMA_CSS_TRANSFORM', 'rpt_css') }}"
        +tags:
          - staging
        +materialized: view
      final:
        +schema: "{{ env_var('DBT_SCHEMA_CSS_TRANSFORM', 'rpt_css') }}"
        +tags:
          - final
        +materialized: view

seeds:
  delta:
    +schema: "{{ env_var('DBT_SCHEMA_MITOS_RAW', env_var('DBT_SCHEMA_RAW', 'src_byod_mitos')) }}"
