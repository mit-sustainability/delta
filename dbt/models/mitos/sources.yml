version: 2

sources:
  - name: raw_uploads
    description: >
      MITOS raw tables loaded by Dagster or local fixture scripts. In production these tables live in
      Snowflake; in local development they are mirrored into PostgreSQL under the MITOS raw schema
      so downstream dbt models can still build against the same source contract.
    schema: "{{ env_var('MITOS_RAW_UPLOADS_SOURCE_SCHEMA', env_var('DBT_SCHEMA_MITOS_RAW', env_var('DBT_SCHEMA_RAW', 'src_byod_mitos'))) }}"
    tables:
      - name: uploaded_table_example
        description: >
          Example placeholder for a manually uploaded or Data Hub-derived raw table. Keep the table
          name and columns consistent across Snowflake and local Postgres.
  - name: warehouse_smoke
    description: >
      Deterministic warehouse smoke-test table written by a Dagster asset in either local Postgres
      or Snowflake, then consumed by dbt to validate raw-to-transform lineage.
    schema: "{{ env_var('MITOS_WAREHOUSE_SMOKE_SOURCE_SCHEMA', env_var('DBT_SCHEMA_MITOS_RAW', env_var('DBT_SCHEMA_RAW', 'src_byod_mitos'))) }}"
    tables:
      - name: warehouse_test_input
        description: >
          Small raw smoke-test table whose rows are rewritten on each Dagster run. Snowflake
          assumes the target schema already exists.
